<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <!-- subtle map-like background lines -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#bbf7d0" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#bbf7d0" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#bbf7d0" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#bbf7d0" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#bbf7d0" stroke-width="1"/>
  <!-- Heart + medical cross icon -->
  <g transform="translate(340,130)">
    <ellipse cx="60" cy="60" rx="50" ry="50" fill="white" opacity="0.85"/>
    <!-- cross -->
    <rect x="50" y="35" width="20" height="50" rx="4" fill="#16a34a"/>
    <rect x="35" y="50" width="50" height="20" rx="4" fill="#16a34a"/>
  </g>
  <text x="400" y="265" font-family="Georgia, serif" font-size="26" fill="#14532d" text-anchor="middle" font-weight="bold">Drugs &amp; Help for Lebanon</text>
  <text x="400" y="300" font-family="Georgia, serif" font-size="16" fill="#166534" text-anchor="middle">Medicines to Beirut after the 2020 explosion</text>
  <text x="400" y="330" font-family="Georgia, serif" font-size="13" fill="#15803d" text-anchor="middle">Rotaract ERIC · Italy country representative · 2020</text>
</svg>

# Deploys the Astro site to GitHub Pages on pushes to main.
#
# One-time setup after this workflow lands:
#   GitHub -> Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
#
# withastro/action@v3 handles install + build + artifact upload. We keep an
# explicit setup-node step purely for the npm cache. Do not add "npm ci" --
# withastro/action runs it internally.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
